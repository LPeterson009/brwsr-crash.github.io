TML<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Closing Window</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: #f0f0f0;
        }
    </style>
</head>
<body>
    <h1>This window will close automatically...</h1>
    <p>If it doesn't close, it may be because the browser blocked it (security restriction).</p>

    <script>
        // Close the window as soon as the page loads
        window.onload = function() {
            // Small delay to ensure the page has fully loaded
            setTimeout(() => {
                window.close();
            }, 100);
        };

        // Alternative immediate attempt
        window.close();
    </script>
</body>
